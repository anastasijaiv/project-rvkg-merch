<!DOCTYPE html>
<html lang="en">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(rgba(14, 26, 68, 0.7), rgba(14, 26, 68, 0.7)),
                url('https://www.rkg.lv/media/images/DJI_0143_1.original.jpg') center/cover fixed;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(14, 26, 68, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            box-shadow: 0 18px 70px rgba(0, 0, 0, 0.45);
            padding: 32px 28px;
            color: #fff;
            backdrop-filter: blur(8px);
        }

        h2 {
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            font-size: 1.8rem;
            text-align: center;
            position: relative;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, #e4b400, #ffffff);
            border-radius: 2px;
        }

        .error {
            margin-top: 10px;
            margin-bottom: 8px;
            background: rgba(220, 53, 69, 0.18);
            border: 1px solid rgba(220, 53, 69, 0.35);
            color: #ffffff;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        form {
            margin-top: 1px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.92);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            border-radius: 10px;
            font-family: 'Roboto', sans-serif;
            font-size: 1rem;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.95);
            color: #0e1a44;
        }

        input:focus {
            outline: none;
            border-color: #e4b400;
            box-shadow: 0 0 0 4px rgba(228, 180, 0, 0.18);
        }

        button {
            width: 100%;
            margin-top: 6px;
            background: linear-gradient(135deg, #e4b400 0%, #d4a700 100%);
            color: #0e1a44;
            border: none;
            padding: 14px 22px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(228, 180, 0, 0.35);
        }

        button:hover {
            background: linear-gradient(135deg, #d4a700 0%, #c49700 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(228, 180, 0, 0.45);
        }

        button:active {
            transform: translateY(0);
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 28px 18px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
</head>

<body>

    <h2>Admin Login</h2>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post" action="{{ url_for('admin_login') }}">
        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>

</body>

</html>
